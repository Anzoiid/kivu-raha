<!DOCTYPE html>
<html>
    <head>
	<!-- Apply saved theme before page renders (prevents flash) -->
	<script>
		(function() {
			var saved = localStorage.getItem('theme-version');
			if (saved) {
				document.documentElement.setAttribute('data-theme-version', saved);
				if (document.body) {
					document.body.setAttribute('data-theme-version', saved);
					// Set inline background to prevent flash
					document.body.style.backgroundColor = (saved === 'dark') ? '#171717' : '#F8F8F8';
				}
			}
		})();
	</script>
        <title>jQuery Smart Wizard test file</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body onload="applyTheme()">
      <div id="smartwizard">

          <ul class="nav">
              <li class="nav-item">
                <a class="nav-link" href="#step-1">
                  <strong>Step 1</strong> This is step description
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#step-2">
                  <strong>Step 2</strong> This is step description
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#step-3">
                  <strong>Step 3</strong> This is step description
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#step-4">
                  <strong>Step 4</strong> This is step description
                </a>
              </li>
          </ul>

          <div class="tab-content">
              <div id="step-1" class="tab-pane" role="tabpanel" aria-labelledby="step-1">
                  Step 1 Content
              </div>
              <div id="step-2" class="tab-pane" role="tabpanel" aria-labelledby="step-2">
                  Step 2 Content
              </div>
              <div id="step-3" class="tab-pane" role="tabpanel" aria-labelledby="step-3">
                  Step 3 Content
              </div>
              <div id="step-4" class="tab-pane" role="tabpanel" aria-labelledby="step-4">
                  Step 4 Content
              </div>
          </div>
      </div>
    </body>
</html>
